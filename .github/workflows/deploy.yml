name: CI/CD Pipeline for Web Application Deployment

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm ci

      - name: Run Linter
        run: |
          npm run lint

      - name: Run Tests
        run: |
          npm test

      - name: Build Application
        run: |
          npm run build

  dockerize-and-deploy:
    name: Dockerize and Deploy
    needs: build-and-test
    runs-on: ubuntu-latest
    # Only run on pushes to main (not pull requests)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Short Commit SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            GIT_SHA=${{ github.sha }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/my-web-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/my-web-app:${{ steps.vars.outputs.sha_short }}

      - name: Trigger Render Deploy Hook
        run: |
          curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

      - name: Deployment Summary
        run: |
          echo "Deployed commit $GITHUB_SHA to production"
